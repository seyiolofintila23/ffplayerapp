services:
  - type: web
    name: ffplayerapp
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: ffplayerapp-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
